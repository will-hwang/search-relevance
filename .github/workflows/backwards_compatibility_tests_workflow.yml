name: Backwards Compatibility Tests SearchRelevance
on:
  push:
    branches:
      - "*"
      - "feature/**"
  pull_request:
    branches:
      - "*"
      - "feature/**"

jobs:
  Get-CI-Image-Tag:
    uses: opensearch-project/opensearch-build/.github/workflows/get-ci-image-tag.yml@main
    with:
      product: opensearch

  Rolling-Upgrade-BWCTests-SearchRelevance:
    needs: Get-CI-Image-Tag
    strategy:
      matrix:
        java: [21, 25]
        os: [ubuntu-latest]
        bwc_version: ["3.3.0"]
        opensearch_version: ["3.4.0"]

    name: SearchRelevance Rolling-Upgrade BWC Tests
    runs-on: ${{ matrix.os }}
    container:
      image: ${{ needs.Get-CI-Image-Tag.outputs.ci-image-version-linux }}
      options: ${{ needs.Get-CI-Image-Tag.outputs.ci-image-start-options }}
    env:
      BWC_VERSION_ROLLING_UPGRADE: ${{ matrix.bwc_version }}

    steps:
      - name: Run start commands
        run: ${{ needs.Get-CI-Image-Tag.outputs.ci-image-start-command }}
      - name: Checkout search-relevance
        uses: actions/checkout@v6
      - name: Setup Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
      - name: Run SearchRelevance Rolling-Upgrade BWC Tests
        run: |
          chown -R 1000:1000 `pwd`
          echo "Running rolling-upgrade backwards compatibility tests..."
          su `id -un 1000` -c "./gradlew :qa:rolling-upgrade:testRollingUpgrade -Dtests.bwc.version=${{ matrix.bwc_version }} --no-daemon"

  Restart-Upgrade-BWCTests-SearchRelevance:
    needs: Get-CI-Image-Tag
    strategy:
      matrix:
        java: [21, 25]
        os: [ubuntu-latest]
        bwc_version: ["3.3.0"]
        opensearch_version: ["3.4.0"]

    name: SearchRelevance Restart-Upgrade BWC Tests
    runs-on: ${{ matrix.os }}
    container:
      image: ${{ needs.Get-CI-Image-Tag.outputs.ci-image-version-linux }}
      options: ${{ needs.Get-CI-Image-Tag.outputs.ci-image-start-options }}
    env:
      BWC_VERSION_RESTART_UPGRADE: ${{ matrix.bwc_version }}

    steps:
      - name: Run start commands
        run: ${{ needs.Get-CI-Image-Tag.outputs.ci-image-start-command }}
      - name: Checkout search-relevance
        uses: actions/checkout@v6
      - name: Setup Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
      - name: Run SearchRelevance Restart-Upgrade BWC Tests
        run: |
          chown -R 1000:1000 `pwd`
          echo "Running restart-upgrade backwards compatibility tests..."
          su `id -un 1000` -c "./gradlew :qa:restart-upgrade:testRestartUpgrade -Dtests.bwc.version=${{ matrix.bwc_version }} --no-daemon"
